<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">Mi Sitio</a>
      <div>
        <a class="nav-link text-white d-inline" href="inicio.html">Inicio</a>
        <a class="nav-link text-white d-inline" href="perfil.html">Perfil</a>
        <a class="nav-link text-white d-inline" href="tags.html">Tags</a>
        <a class="nav-link text-white d-inline" href="about.html">About</a>
      </div>
    </div>
  </nav>

  <div class="container mt-4">

    <h1 class="text-center">Login</h1>

    <div class="card p-4 mt-3">
      <div>
        <label class="form-label">Usuario:</label>
        <input type="text" id="username" class="form-control mb-3" placeholder="Usuario">

        <label class="form-label">Contraseña:</label>
        <input type="password" id="password" class="form-control mb-3" placeholder="Contraseña">

        <div id="msg" class="alert d-none" role="alert"></div>

        <button type="button" id="btnEnviar" class="btn btn-primary w-100">
          Enviar
        </button>

        <button type="button" id="btnLimpiar" class="btn btn-outline-secondary w-100 mt-2">
          Limpiar
        </button>
      </div>
    </div>

  </div>

  <script src="index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
