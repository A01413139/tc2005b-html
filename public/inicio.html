<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="inicio.html">Mi Sitio</a>
    <div>
      <a class="nav-link text-white d-inline" href="inicio.html">Inicio</a>
      <a class="nav-link text-white d-inline" href="perfil.html">Perfil</a>
      <a class="nav-link text-white d-inline" href="usuarios.html">Usuarios</a>
      <a class="nav-link text-white d-inline" href="productos.html">Productos</a>
      <a class="nav-link text-white d-inline" href="about.html">About</a>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <h1>Inicio</h1>
  <p id="bienvenida" class="lead"></p>
  <p id="info-rol"></p>
  <button id="btnLogout" class="btn btn-danger mt-2">Cerrar sesión</button>
</div>

<script>
  const userData = JSON.parse(localStorage.getItem("user"));
  if (!userData) {
    window.location.href = "index.html";
  } else {
    document.getElementById("bienvenida").textContent = `Bienvenido, ${userData.username}`;
    document.getElementById("info-rol").textContent = `Rol: ${userData.role} | Nivel: ${userData.nivel}`;
  }

  document.getElementById("btnLogout").addEventListener("click", () => {
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    window.location.href = "index.html";
  });
</script>

</body>
</html>
