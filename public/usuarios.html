<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Usuarios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <h1>Usuarios</h1>

  <input type="text" id="new-username" placeholder="Username" class="form-control mb-2">
  <input type="text" id="new-firstname" placeholder="Nombre" class="form-control mb-2">
  <input type="text" id="new-lastname" placeholder="Apellido" class="form-control mb-2">
  <input type="password" id="new-password" placeholder="Contraseña" class="form-control mb-2">
  <button onclick="crearUsuario()" class="btn btn-success mb-4">Agregar</button>

  <table class="table table-bordered">
    <thead><tr><th>ID</th><th>Username</th><th>Nombre</th><th>Rol</th><th>Eliminar</th></tr></thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<script>
  const API = "http://localhost:3000";

  async function cargar() {
    const res = await fetch(`${API}/users`);
    const data = await res.json();
    const tbody = document.getElementById("tabla");
    tbody.innerHTML = "";
    data.forEach(u => {
      tbody.innerHTML += `<tr>
        <td>${u.user_id}</td>
        <td>${u.username}</td>
        <td>${u.first_name} ${u.last_name}</td>
        <td>${u.role}</td>
        <td><button class="btn btn-sm btn-danger" onclick="eliminar(${u.user_id})">X</button></td>
      </tr>`;
    });
  }

  async function crearUsuario() {
    const body = {
      username: document.getElementById("new-username").value,
      first_name: document.getElementById("new-firstname").value,
      last_name: document.getElementById("new-lastname").value,
      password: document.getElementById("new-password").value
    };
    await fetch(`${API}/users`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    cargar();
  }

  async function eliminar(id) {
    await fetch(`${API}/users/${id}`, { method: "DELETE" });
    cargar();
  }

  cargar();
</script>
</body>
</html>
