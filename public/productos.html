<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Productos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <h1>Productos</h1>

  <input type="text" id="new-nombre" placeholder="Nombre" class="form-control mb-2">
  <input type="number" id="new-precio" placeholder="Precio" class="form-control mb-2">
  <input type="number" id="new-stock" placeholder="Stock" class="form-control mb-2">
  <button onclick="crearProducto()" class="btn btn-success mb-4">Agregar</button>

  <table class="table table-bordered">
    <thead><tr><th>ID</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Eliminar</th></tr></thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<script>
  const API = "http://localhost:3000";

  async function cargar() {
    const res = await fetch(`${API}/productos`);
    const data = await res.json();
    const tbody = document.getElementById("tabla");
    tbody.innerHTML = "";
    data.forEach(p => {
      tbody.innerHTML += `<tr>
        <td>${p.id}</td>
        <td>${p.nombre}</td>
        <td>$${p.precio}</td>
        <td>${p.stock}</td>
        <td><button class="btn btn-sm btn-danger" onclick="eliminar(${p.id})">X</button></td>
      </tr>`;
    });
  }

  async function crearProducto() {
    const body = {
      nombre: document.getElementById("new-nombre").value,
      precio: document.getElementById("new-precio").value,
      stock:  document.getElementById("new-stock").value
    };
    await fetch(`${API}/productos`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    cargar();
  }

  async function eliminar(id) {
    await fetch(`${API}/productos/${id}`, { method: "DELETE" });
    cargar();
  }

  cargar();
</script>
</body>
</html>
